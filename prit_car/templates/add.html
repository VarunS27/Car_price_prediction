<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-100">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-800 text-white p-5 space-y-6 fixed inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <h2 class="text-2xl font-bold">Car Dashboard</h2>
        <nav>
            <ul class="space-y-4">
                <li><a href="{{ url_for('dashboard') }}" class="block px-4 py-2 hover:bg-gray-700">Dashboard</a></li>
                <li><a href="{{ url_for('add') }}" id="addCarBtn" class="block px-4 py-2 hover:bg-gray-700">Add Cars</a></li>
                <li><a href="#" class="block px-4 py-2 hover:bg-gray-700">Settings</a></li>
                <li><a href="#" class="block px-4 py-2 hover:bg-gray-700">Profile</a></li>
                <li><a href="{{ url_for('home') }}" class="block px-4 py-2 hover:bg-gray-700">Logout</a></li>
            </ul>
        </nav>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-1 p-6 ml-0 md:ml-64 transition-all duration-300">
        <button id="hamburger" class="text-gray-800 text-2xl absolute top-5 left-5 md:hidden">&#9776;</button>
        <h1 class="text-3xl font-bold mb-6">Your Car Listing</h1>
        <div class="flex justify-center mt-10">
            <button id="openModal" class="px-6 py-3 bg-blue-600 text-white rounded-md">Add Car</button>
        </div>
    </main>
    
    <!-- Modal -->
    <div id="carModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg w-96">
            <h2 class="text-xl font-bold mb-4">Add Car Details</h2>
            <form id="carForm">
                <label class="block mb-2">Car Name</label>
                <input type="text" id="carName" class="w-full p-2 border rounded mb-4" required>
                
                <label class="block mb-2">Owner Count</label>
                <select id="ownerCount" class="w-full p-2 border rounded mb-4">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                </select>
                
                <label class="block mb-2">Car Number Plate</label>
                <input type="text" id="carNumber" class="w-full p-2 border rounded mb-4" required>
                
                <label class="block mb-2">Year of Purchase</label>
                <input type="number" id="purchaseYear" class="w-full p-2 border rounded mb-4" required>
                
                <label class="block mb-2">Purchase Price</label>
                <input type="number" id="purchasePrice" class="w-full p-2 border rounded mb-4" required>
                
                <div class="flex justify-between">
                    <button type="button" id="closeModal" class="px-4 py-2 bg-gray-500 text-white rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Add</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Modal functionality
        const openModal = document.getElementById("openModal");
        const closeModal = document.getElementById("closeModal");
        const carModal = document.getElementById("carModal");
        
        openModal.addEventListener("click", () => {
            carModal.classList.remove("hidden");
        });
        
        closeModal.addEventListener("click", () => {
            carModal.classList.add("hidden");
        });
        
        // Sidebar toggle functionality
        const sidebar = document.getElementById("sidebar");
        const hamburger = document.getElementById("hamburger");
        let sidebarVisible = false;
        
        hamburger.addEventListener("click", () => {
            if (sidebarVisible) {
                sidebar.classList.add("-translate-x-full");
            } else {
                sidebar.classList.remove("-translate-x-full");
            }
            sidebarVisible = !sidebarVisible;
        });
    </script>
</body>
</html>
